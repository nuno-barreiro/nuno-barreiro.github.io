---
layout: default
---

<header>
  <h1>{{page.title}}</h1>
</header>

<div>{{ content }}</div>

<div class="row">
  <span class="text-muted text-uppercase">{% for tag in page.tags%}{{tag}}&nbsp;{% endfor %}</span>
</div>

<div class="row">
  <div class="col-sm-6 text-left">
    {% if page.previous.url %}
    <a class="prev" href="{{ page.previous.url }}">
      &laquo; {{ page.previous.title }}
    </a>
    {% endif %}
  </div>
  <div class="col-sm-6 text-right">
    {% if page.next.url %}
    <a class="next" href="{{ page.next.url }}">
      {{ page.next.title }} &raquo;
    </a>
    {% endif %}
  </div>
</div>
